{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="page-header" style="text-align:center;">
    <h1 class="page-title"><span class="page-title-accent">➕ ADD NEW EXPENSE</span></h1>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('add_expense') }}">
        <p class="form-label-center">How much did you spend?</p>
        <div class="form-group">
            <input type="number" step="0.01" name="amount" class="form-input-big" placeholder="0.00" required>
        </div>

        <p class="form-label-center" style="margin-top:20px;">What was it for?</p>
        <div class="form-group">
            <select name="category" class="form-select" required>
                <option value="🍔 FOOD">🍔 FOOD</option>
                <option value="🚕 TRANSPORT">🚕 TRANSPORT</option>
                <option value="💡 BILLS">💡 BILLS</option>
                <option value="🎮 FUN">🎮 FUN</option>
                <option value="🎓 STUDIES">🎓 STUDIES</option>
                <option value="📦 OTHER">📦 OTHER</option>
            </select>
        </div>

        <p class="form-label-center" style="margin-top:20px;">Brief Description</p>
        <div class="form-group">
            <input type="text" name="description" class="form-input" placeholder="Enter detail..." required>
        </div>

        <button type="submit" class="btn btn-accent btn-full" style="margin-top:30px; height:55px; font-size:16px;">
            ✅ SAVE EXPENSE
        </button>
    </form>
</div>
{% endblock %}
